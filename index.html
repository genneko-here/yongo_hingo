<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>デジタルカード</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Shippori+Mincho:wght@400;600&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #08070d;
    --surface: #100e18;
    --card: #16131f;
    --border: rgba(160,120,255,0.13);
    --gold: #9b6fff;
    --gold-light: #b99aff;
    --text: #ece8f5;
    --muted: #6b6380;
    --accent: #c084fc;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif JP', serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 60% 50% at 20% 20%, rgba(120,60,220,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 80% 80%, rgba(180,100,255,0.06) 0%, transparent 60%);
    pointer-events: none;
  }

  .grain {
    position: fixed;
    inset: 0;
    opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    pointer-events: none;
  }

  .wrapper {
    width: 100%;
    max-width: 420px;
    position: relative;
    z-index: 1;
  }

  /* ── VIEW MODE ── */
  .card-view { display: block; }
  .card-edit { display: none; }

  /* Profile */
  .profile-section {
    text-align: center;
    margin-bottom: 2.4rem;
    animation: fadeUp 0.7s ease both;
  }

  .avatar-wrap {
    position: relative;
    display: inline-block;
    margin-bottom: 1.2rem;
  }

  .avatar {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.2rem;
    background: var(--card);
    overflow: hidden;
  }

  .avatar-ring {
    position: absolute;
    inset: -5px;
    border-radius: 50%;
    border: 1px solid rgba(155,111,255,0.3);
    animation: spin 12s linear infinite;
    background: conic-gradient(from 0deg, transparent 70%, rgba(155,111,255,0.45) 100%);
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .name {
    font-family: 'Shippori Mincho', serif;
    font-size: 1.55rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--text);
    margin-bottom: 0.3rem;
  }

  .handle {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--gold);
    letter-spacing: 0.15em;
    text-transform: lowercase;
    margin-bottom: 0.7rem;
  }

  .bio {
    font-size: 0.82rem;
    color: var(--muted);
    line-height: 1.7;
    letter-spacing: 0.03em;
    padding: 0 0.5rem;
  }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    margin-bottom: 1.4rem;
    animation: fadeUp 0.7s 0.1s ease both;
  }
  .divider-line { flex: 1; height: 1px; background: var(--border); }
  .divider-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--gold); opacity: 0.6; }

  /* Links */
  .links-list { display: flex; flex-direction: column; gap: 0.75rem; }

  .link-item {
    display: flex;
    align-items: center;
    gap: 0.9rem;
    padding: 0.85rem 1.1rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    text-decoration: none;
    color: var(--text);
    transition: all 0.25s ease;
    animation: fadeUp 0.6s ease both;
    position: relative;
    overflow: hidden;
  }

  .link-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: linear-gradient(to bottom, var(--gold), var(--accent));
    opacity: 0;
    transition: opacity 0.25s;
  }

  .link-item:hover {
    border-color: rgba(155,111,255,0.35);
    background: rgba(155,111,255,0.05);
    transform: translateX(3px);
  }

  .link-item:hover::before { opacity: 1; }

  .link-icon {
    font-size: 1.25rem;
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.04);
    border-radius: 7px;
    flex-shrink: 0;
  }

  .link-text { flex: 1; }
  .link-label {
    font-size: 0.82rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    margin-bottom: 0.1rem;
  }
  .link-desc {
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.02em;
    font-family: 'DM Mono', monospace;
  }

  .link-arrow {
    color: var(--muted);
    font-size: 0.75rem;
    transition: color 0.25s;
  }
  .link-item:hover .link-arrow { color: var(--gold); }

  /* QR Section */
  .qr-section {
    margin-top: 2rem;
    text-align: center;
    animation: fadeUp 0.7s 0.3s ease both;
  }

  .qr-toggle {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    padding: 0.5rem 1.2rem;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.25s;
  }
  .qr-toggle:hover { border-color: var(--gold); color: var(--gold); }

  .qr-box {
    display: none;
    margin-top: 1.2rem;
    padding: 1.2rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 0.6rem;
  }
  .qr-box.visible { display: flex; }
  #qrcode canvas, #qrcode img { border-radius: 6px; }
  .qr-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  /* Footer */
  .footer {
    margin-top: 2.5rem;
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: rgba(122,114,100,0.4);
    letter-spacing: 0.1em;
  }

  /* Icon area in edit card */
  .icon-edit-area {
    display: flex;
    gap: 0.6rem;
    align-items: flex-start;
    margin-bottom: 0.65rem;
  }

  .icon-preview-wrap {
    position: relative;
    width: 54px;
    height: 54px;
    flex-shrink: 0;
    border-radius: 9px;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .icon-preview-wrap:hover { border-color: var(--gold); }

  .icon-preview-img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 8px;
    display: none;
  }
  .icon-preview-emoji { font-size: 1.5rem; line-height: 1; }

  .icon-upload-overlay {
    position: absolute;
    inset: 0;
    background: rgba(155,111,255,0.75);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s;
    font-size: 0.6rem;
    color: #fff;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.04em;
    text-align: center;
    border-radius: 8px;
    pointer-events: none;
  }
  .icon-preview-wrap:hover .icon-upload-overlay { opacity: 1; }

  .icon-edit-fields { flex: 1; display: flex; flex-direction: column; gap: 0.4rem; }
  .icon-file-input { display: none; }

  .icon-clear-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 5px;
    font-size: 0.6rem;
    font-family: 'DM Mono', monospace;
    padding: 0.25rem 0.5rem;
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: all 0.2s;
    align-self: flex-start;
  }
  .icon-clear-btn:hover { color: #e57373; border-color: #e57373; }

  .del-btn {
    float: right;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.8rem;
    padding: 0;
    transition: color 0.2s;
  }
  .del-btn:hover { color: #e57373; }

  .add-link-btn {
    width: 100%;
    padding: 0.65rem;
    background: none;
    border: 1px dashed rgba(155,111,255,0.3);
    border-radius: 8px;
    color: var(--gold);
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 1.2rem;
  }
  .add-link-btn:hover { border-color: var(--gold); background: rgba(155,111,255,0.05); }

  .save-btn {
    width: 100%;
    padding: 0.8rem;
    background: var(--gold);
    border: none;
    border-radius: 8px;
    color: #0e0d0b;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 0.6rem;
  }
  .save-btn:hover { background: var(--gold-light); }

  .cancel-btn {
    width: 100%;
    padding: 0.6rem;
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
  }
  .cancel-btn:hover { border-color: var(--muted); color: var(--text); }

  .section-sub {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin: 1.2rem 0 0.7rem;
    padding-bottom: 0.4rem;
    border-bottom: 1px solid var(--border);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Link delays */
  .link-item:nth-child(1) { animation-delay: 0.15s; }
  .link-item:nth-child(2) { animation-delay: 0.22s; }
  .link-item:nth-child(3) { animation-delay: 0.29s; }
  .link-item:nth-child(4) { animation-delay: 0.36s; }
  .link-item:nth-child(5) { animation-delay: 0.43s; }

  .avatar-emoji { font-size: 2.4rem; line-height: 1; }
</style>
</head>

  document.getElementById('nameDisplay').textContent = data.name;
  document.getElementById('handleDisplay').textContent = data.handle;
  document.getElementById('bioDisplay').innerHTML = (data.bio || '').replace(/\n/g, '<br>');

  const list = document.getElementById('linksList');
  list.innerHTML = '';
  data.links.forEach((l, i) => {
    const a = document.createElement('a');
    a.className = 'link-item';
    a.href = l.url || '#';
    a.target = '_blank';
    a.rel = 'noopener';
    a.style.animationDelay = (0.12 + i * 0.07) + 's';
    a.innerHTML = `
      <div class="link-icon">${l.image ? `<img src="${l.image}" style="width:100%;height:100%;object-fit:cover;border-radius:7px;">` : (l.icon || '🔗')}</div>
      <div class="link-text">
        <div class="link-label">${l.label}</div>
        <div class="link-desc">${l.desc || ''}</div>
      </div>
      <div class="link-arrow">›</div>`;
    list.appendChild(a);
  });

  // QR code
  const qrDiv = document.getElementById('qrcode');
  qrDiv.innerHTML = '';
  new QRCode(qrDiv, {
    text: window.location.href,
    width: 140, height: 140,
    colorDark: '#ece8f5',
    colorLight: '#16131f',
    correctLevel: QRCode.CorrectLevel.M
  });

// ── QR toggle ──
let qrVisible = false;
function toggleQR() {
  qrVisible = !qrVisible;
  document.getElementById('qrBox').classList.toggle('visible', qrVisible);
}

// ── Edit mode ──
function openEdit() {
  document.getElementById('editEmoji').value = data.emoji || '';
  document.getElementById('editName').value = data.name;
  document.getElementById('editHandle').value = data.handle;
  document.getElementById('editBio').value = data.bio || '';
  renderLinksEditor();
  document.getElementById('cardView').style.display = 'none';
  document.getElementById('cardEdit').style.display = 'block';
  document.getElementById('editBtnFloat').style.display = 'none';
}

function cancelEdit() {
  document.getElementById('cardView').style.display = 'block';
  document.getElementById('cardEdit').style.display = 'none';
  document.getElementById('editBtnFloat').style.display = 'block';
}

function saveEdit() {
  data.emoji = document.getElementById('editEmoji').value.trim() || '🎲';
  data.name = document.getElementById('editName').value.trim() || 'My Card';
  data.handle = document.getElementById('editHandle').value.trim();
  data.bio = document.getElementById('editBio').value.trim();

  // Collect links from editor
  const cards = document.querySelectorAll('.link-edit-card');
  data.links = [];
  cards.forEach(card => {
    const emoji = card.querySelector('.icon-emoji-input').value.trim() || '🔗';
    const image = card.querySelector('.icon-img-data').value || '';
    const label = card.querySelector('.link-label-input').value.trim();
    const desc  = card.querySelector('.link-desc-input').value.trim();
    const url   = card.querySelector('.link-url-input').value.trim();
    if (label) data.links.push({ icon: emoji, image, label, desc, url });
  });

  save();
  cancelEdit();
  render();
}

function renderLinksEditor() {
  const editor = document.getElementById('linksEditor');
  editor.innerHTML = '';
  data.links.forEach((l, i) => addLinkField(l));
}

function addLinkField(l = {}) {
  const editor = document.getElementById('linksEditor');
  const div = document.createElement('div');
  div.className = 'link-edit-card';
  const uid = 'lnk_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
  const hasImg = !!l.image;
  div.innerHTML = `
    <button class="del-btn" onclick="this.closest('.link-edit-card').remove()">✕ 削除</button>
    <div class="icon-edit-area">
      <div class="icon-preview-wrap" onclick="document.getElementById('${uid}').click()">
        <img class="icon-preview-img" ${hasImg ? `src="${l.image}" style="display:block"` : ''}>
        <span class="icon-preview-emoji" ${hasImg ? 'style="display:none"' : ''}>${l.icon||'🔗'}</span>
        <div class="icon-upload-overlay">📷<br>画像</div>
        <input class="icon-file-input" id="${uid}" type="file" accept="image/*">
        <input class="icon-img-data" type="hidden" value="${hasImg ? l.image : ''}">
      </div>
      <div class="icon-edit-fields">
        <input class="field-input icon-emoji-input" type="text" placeholder="🔗 絵文字" value="${l.icon||'🔗'}" style="font-size:1rem;">
        <button class="icon-clear-btn" onclick="clearIconImage(this)">✕ 画像を削除</button>
      </div>
    </div>
    <div class="link-edit-row full">
      <input class="field-input link-label-input" type="text" placeholder="リンク名" value="${l.label||''}">
    </div>
    <div class="link-edit-row full">
      <input class="field-input link-desc-input" type="text" placeholder="説明文" value="${l.desc||''}">
    </div>
    <div class="link-edit-row full">
      <input class="field-input link-url-input" type="url" placeholder="https://..." value="${l.url||''}">
    </div>`;
  editor.appendChild(div);

  // File input handler
  const fileInput = div.querySelector('.icon-file-input');
  fileInput.addEventListener('change', function() {
    const file = this.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      const src = e.target.result;
      const wrap = this.closest('.icon-preview-wrap');
      const img = wrap.querySelector('.icon-preview-img');
      const emo = wrap.querySelector('.icon-preview-emoji');
      img.src = src;
      img.style.display = 'block';
      emo.style.display = 'none';
      wrap.querySelector('.icon-img-data').value = src;
    };
    reader.readAsDataURL(file);
  });
}

function clearIconImage(btn) {
  const wrap = btn.closest('.link-edit-card').querySelector('.icon-preview-wrap');
  const img = wrap.querySelector('.icon-preview-img');
  const emo = wrap.querySelector('.icon-preview-emoji');
  img.src = '';
  img.style.display = 'none';
  emo.style.display = '';
  wrap.querySelector('.icon-img-data').value = '';
}

// ── Init ──
render();
</script>
